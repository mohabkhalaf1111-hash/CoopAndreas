name: Build CoopAndreas

on:
  workflow_dispatch:

env:
  PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Download and Build plugin-sdk
      shell: cmd
      run: |
        git clone https://github.com/DK22Pac/plugin-sdk.git
        cd plugin-sdk
        git checkout 050d18b6e1770477deab81a40028a40277583d97
        .\tools\premake\premake5.exe --file=tools\premake\premake5.lua vs2022
        msbuild plugin.sln /p:Configuration=Release /p:Platform=Win32 /m
      
    - name: Build CoopAndreas
      shell: cmd
      run: |
        xmake f -m release -a x86 -p windows -y
        xmake
        
    - name: Collect Release Files
      shell: cmd
      run: |
        mkdir Release
        copy build\windows\x86\release\CoopAndreasSA.dll Release\
        copy build\windows\x86\release\proxy.dll Release\eax.dll
        copy build\windows\x86\release\server.exe Release\

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CoopAndreas-Ready-Files
        path: Release\*
